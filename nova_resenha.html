<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Leituras - Capítulo 1</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --marrom-principal: #633535;
            --rosa-fundo: #faeeeb;
            --vinho-destaque: #8b4361;
        }

        body {
            background-color: #fdf5f3; 
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--marrom-principal);
        }

        .container-registro {
            background-color: rgba(250, 238, 235, 0.9);
            width: 95%;
            max-width: 1100px;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #b89794;
        }

        header h1 {
            font-family: 'Great Vibes', cursive;
            text-align: center;
            font-size: 3.5rem;
            margin: 0;
            font-weight: 400;
        }

        .subtitulo {
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 40px;
        }

        .col { display: flex; flex-direction: column; gap: 15px; }

        /* Estilo dos Inputs */
        input[type="text"], input[type="url"], input[type="date"], select, textarea, .input-numero {
            width: 100%;
            padding: 10px 18px;
            border: 1px solid var(--marrom-principal);
            border-radius: 25px;
            background: transparent;
            font-family: 'Montserrat', sans-serif;
            color: var(--marrom-principal);
            box-sizing: border-box;
        }

        /* Checkbox e Números de Páginas/Caps */
        .info-numerica {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .item-numero {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }

        .input-numero {
            width: 80px;
            border-radius: 15px;
            padding: 5px 10px;
        }

        /* Seletores de Ícones */
        .icon-selector { display: flex; gap: 15px; margin: 5px 0; }
        .icon-selector input { display: none; }
        .icon-selector label img {
            width: 45px;
            cursor: pointer;
            transition: 0.3s;
            filter: sepia(0.5) opacity(0.6);
        }

        .icon-selector label:hover img {
            filter: sepia(0) opacity(1);
            transform: scale(1.1);
        }

        .icon-selector input:checked + label img {
            filter: sepia(0) opacity(1);
            border-bottom: 2px solid var(--vinho-destaque);
        }

        .btn-enviar {
            background-color: var(--marrom-principal);
            color: white;
            border: none;
            padding: 15px 60px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            align-self: flex-end;
            transition: 0.3s;
        }

        .btn-enviar:hover { background-color: var(--vinho-destaque); }

        .citacao-box {
            grid-column: 1 / -1;
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container-registro">
    <header>
        <h1>Registro de leituras</h1>
        <div class="subtitulo">Comece aqui sua história</div>
    </header>

    <form class="form-grid" id="formLeitura">
        <div class="col">
            <input type="text" placeholder="Título do livro" required>
            <input type="text" placeholder="Autor">
            <input type="text" placeholder="Editora">
            <input type="url" placeholder="Link da imagem">
            
            <div class="info-numerica">
                <div class="item-numero">
                    <label>Nº de páginas</label>
                    <input type="text" class="input-numero" placeholder="000">
                </div>
                <div class="item-numero">
                    <label>Nº de capítulos</label>
                    <input type="text" class="input-numero" placeholder="00">
                </div>
            </div>

            <div class="info-numerica">
                <div style="flex:1"><label>Início</label><input type="date"></div>
                <div style="flex:1"><label>Fim</label><input type="date"></div>
            </div>

            <div class="info-numerica">
                <select style="flex:1"><option>Gênero</option></select>
                <select style="flex:1"><option>Literary Tropes</option></select>
            </div>
            
            <input type="text" placeholder="Play list (www.youtube.com)">
        </div>

        <div class="col">
            <label>Formato de leitura:</label>
            <div class="icon-selector">
                <input type="radio" name="formato" id="fisico"><label for="fisico"><img src="imagens/fisico.png" alt="Físico"></label>
                <input type="radio" name="formato" id="ebook"><label for="ebook"><img src="imagens/ebook.png" alt="E-book"></label>
                <input type="radio" name="formato" id="audio"><label for="audio"><img src="imagens/audio.png" alt="Audio"></label>
            </div>

            <label>Emoções:</label>
            <div class="icon-selector">
                <input type="radio" name="emo" id="e1"><label for="e1"><img src="imagens/emo1.png"></label>
                <input type="radio" name="emo" id="e2"><label for="e2"><img src="imagens/emo2.png"></label>
                <input type="radio" name="emo" id="e3"><label for="e3"><img src="imagens/emo3.png"></label>
            </div>

            <textarea placeholder="Momento marcantes" rows="2"></textarea>
            <textarea placeholder="Citações" rows="2"></textarea>
            <textarea placeholder="Resenha" rows="4"></textarea>

            <button type="submit" class="btn-enviar">ENVIAR</button>
        </div>

        <div class="citacao-box">
            "Um leitor vive mil vidas antes de morrer. O homem que nunca lê vive apenas uma." — George R.R. Martin [cite: 275]
        </div>
    </form>
</div>

</body>
</html>
